name: Typecheck

on:
  push:
    branches:
      - '**'

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install TypeScript
        run: npm install --no-save typescript

      - name: Run typecheck
        run: npx tsc
