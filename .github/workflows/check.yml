name: Check

on:
  push:

jobs:
  tsc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tsc
        id: tsc_root
        run: npx tsc
        continue-on-error: true

      - name: Run tests tsc
        id: tsc_tests
        if: ${{ always() }}
        run: npx tsc -p tests/tsconfig.json
        continue-on-error: true

      - name: Fail if tsc checks failed
        if: ${{ always() }}
        run: |
          [ "${{ steps.tsc_root.outcome }}" = "success" ] && [ "${{ steps.tsc_tests.outcome }}" = "success" ]

  type-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run type-coverage
        id: type_coverage_root
        run: npx type-coverage
        continue-on-error: true

      - name: Run tests type-coverage
        id: type_coverage_tests
        if: ${{ always() }}
        run: npx type-coverage --project tests/tsconfig.json
        continue-on-error: true

      - name: Fail if type-coverage checks failed
        if: ${{ always() }}
        run: |
          [ "${{ steps.type_coverage_root.outcome }}" = "success" ] && [ "${{ steps.type_coverage_tests.outcome }}" = "success" ]

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  ui-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run UI tests
        run: npm run test:ui

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: test-results/
          retention-days: 30
